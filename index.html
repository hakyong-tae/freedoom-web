<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,height=device-height,initial-scale=1">
<meta name="description" content="Freedoom in your browser — WebAssembly port based on Dwasm (PrBoom+/PrBoomX, GPL-2.0)">
<title>V8m</title>
<script src="https://unpkg.com/@verse8/ads@latest/dist/index.global.js" crossorigin="anonymous"></script>
<style>
body{background-color:#202020;color:#e0e0e0;font-family:Arial,Helvetica,sans-serif;font-size:16px;margin:0;text-align:center}
#startContainer{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(60,0,0,.45) 0%,rgba(15,0,0,.92) 100%),#161616;display:flex;flex-direction:column;align-items:center;justify-content:center}
#startContainer h1{margin:0 0 4px;font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;font-size:64px;font-weight:900;letter-spacing:4px;text-transform:uppercase;color:#e21313;text-shadow:0 0 22px rgba(255,30,0,.6),4px 4px 0 #4a0000,6px 6px 0 #000;-webkit-text-stroke:1px #2a0000}
#startContainer p{margin:0 0 26px;color:#b8a890;font-size:13px;letter-spacing:4px;text-transform:uppercase;text-shadow:1px 1px 0 #000}
#controlsHint{margin:0 auto 26px;border-collapse:collapse;font-size:12px;letter-spacing:2px;text-transform:uppercase;text-shadow:1px 1px 0 #000}
#controlsHint td{padding:3px 14px;text-align:left}
#controlsHint td:first-child{color:#8a8378;text-align:right}
#controlsHint td:last-child{color:#ffb000}
#startButton{min-width:300px;padding:16px 48px;font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;font-size:19px;font-weight:900;letter-spacing:3px;text-transform:uppercase;cursor:pointer;color:#ffb000;background:linear-gradient(180deg,#333 0%,#222 50%,#161616 100%);border:2px solid;border-color:#5c5c5c #141414 #141414 #5c5c5c;box-shadow:0 0 0 2px #000,0 8px 30px rgba(0,0,0,.7);text-shadow:2px 2px 0 #000}
#startButton:hover:not(:disabled){color:#ffe838;background:linear-gradient(180deg,#3d3424 0%,#2a2317 50%,#1a160e 100%);border-color:#8a7434 #1a1408 #1a1408 #8a7434}
#startButton:disabled{color:#6b6b6b;cursor:default}
#dlProgress{accent-color:#b02020}
#statusContainer{display:none;padding-top:30vh}
.spinner{height:50px;width:50px;margin:0 auto 16px;animation:rotation .8s linear infinite;border-left:10px solid #606060;border-right:10px solid #606060;border-bottom:10px solid #606060;border-top:10px solid #fff;border-radius:100%}
@keyframes rotation{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
progress{width:250px;height:20px;margin-top:12px}
textarea{margin:8px auto 0;font-family:monospace;font-size:14px;color:#ccc;border:1px solid #444;width:calc(100% - 24px);height:calc(100vh - 24px);background-color:inherit;resize:none;outline:none;display:none}
canvas{border:0;background-color:#000;width:calc(min(100vw,100vh * 4/3));height:calc(min(100vh,100vw * .75));margin-top:calc(.5 * (100vh - (min(100vh,100vw * .75))));margin-left:auto;margin-right:auto;outline:none;display:none}
@supports(height:1dvh){textarea{height:calc(100dvh - 24px)}canvas{width:calc(min(100dvw,100dvh * 4/3));height:calc(min(100dvh,100dvw * .75));margin-top:calc(.5 * (100dvh - (min(100dvh,100dvw * .75))))}}
#reviveOverlay{display:none;position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(60,0,0,.45) 0%,rgba(20,0,0,.78) 100%);z-index:100}
#revivePanel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);min-width:300px;padding:26px 38px 24px;background:linear-gradient(180deg,#3c3c3c 0%,#262626 12%,#1c1c1c 88%,#101010 100%);border:3px solid;border-color:#6a6a6a #1a1a1a #1a1a1a #6a6a6a;box-shadow:0 0 0 3px #000,inset 0 0 0 1px #000,0 10px 50px rgba(0,0,0,.9);text-align:center}
#revivePanel h2{margin:0 0 4px;font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;font-size:44px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#e21313;text-shadow:0 0 14px rgba(255,30,0,.55),3px 3px 0 #4a0000,4px 4px 0 #000;-webkit-text-stroke:1px #2a0000}
#revivePanel p{margin:0 0 20px;color:#b8a890;font-size:13px;letter-spacing:3px;text-transform:uppercase;text-shadow:1px 1px 0 #000}
.doomBtn{display:block;width:100%;padding:12px 0;margin-bottom:10px;font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;font-weight:900;letter-spacing:2px;text-transform:uppercase;cursor:pointer;background:linear-gradient(180deg,#333 0%,#222 50%,#161616 100%);border:2px solid;border-color:#5c5c5c #141414 #141414 #5c5c5c;box-shadow:0 0 0 2px #000;text-shadow:2px 2px 0 #000}
#reviveAdButton{font-size:17px;color:#ffb000}
#reviveAdButton:hover:not(:disabled){color:#ffe838;background:linear-gradient(180deg,#3d3424 0%,#2a2317 50%,#1a160e 100%);border-color:#8a7434 #1a1408 #1a1408 #8a7434}
#reviveAdButton:disabled{color:#6b6b6b;cursor:default}
#giveUpButton{font-size:12px;color:#9a3b3b;padding:9px 0}
#giveUpButton:hover{color:#d05050}
#toast{display:none;position:fixed;left:50%;bottom:9vh;transform:translateX(-50%);background:#333;color:#eee;border:1px solid #666;border-radius:8px;padding:10px 22px;font-size:14px;z-index:200;white-space:nowrap}
.adRewardBtn{display:none;position:fixed;z-index:50;padding:0;font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;font-weight:900;letter-spacing:1px;text-transform:uppercase;line-height:1.35;cursor:pointer;color:#ffb000;background:linear-gradient(180deg,#3a3a3a 0%,#262626 50%,#181818 100%);border:2px solid;border-color:#5c5c5c #141414 #141414 #5c5c5c;box-shadow:0 0 0 1px #000;text-shadow:1px 1px 0 #000;white-space:nowrap;overflow:hidden}
.adRewardBtn:hover:not(:disabled){color:#ffe838;border-color:#8a7434 #1a1408 #1a1408 #8a7434}
.adRewardBtn:disabled{color:#777;cursor:default}
.adRewardBtn .adTag{display:block;font-size:.72em;color:#c8c4bc;letter-spacing:2px}
.adRewardBtn:hover:not(:disabled) .adTag{color:#fff}
</style>
</head>
<body>
<div id="startContainer">
  <h1>V8m</h1>
  <p>Powered by Yong</p>
  <table id="controlsHint"></table>
  <button id="startButton" disabled>LOADING...</button>
  <p style="margin-top:22px;margin-bottom:0"><progress value="0" max="100" id="dlProgress"></progress></p>
</div>
<div id="statusContainer">
  <div class="spinner"></div>
  <div id="status">Starting...</div>
  <progress value="0" max="100" id="progress" hidden></progress>
</div>
<textarea id="output" readonly></textarea>
<canvas id="canvas" oncontextmenu="event.preventDefault();" tabindex="-1"></canvas>
<div id="reviveOverlay">
  <div id="revivePanel">
    <h2>You Died</h2>
    <p>Rise again where you fell</p>
    <button id="reviveAdButton" class="doomBtn">&#9658; Watch Ad to Revive</button>
    <button id="giveUpButton" class="doomBtn">Give Up &middot; Restart Level</button>
  </div>
</div>
<div id="toast"></div>
<button id="ammoButton" class="adRewardBtn"></button>
<button id="healButton" class="adRewardBtn"></button>
<script>
const startContainerElement = document.getElementById('startContainer');
const startButton = document.getElementById('startButton');
const dlProgressElement = document.getElementById('dlProgress');
const statusContainerElement = document.getElementById('statusContainer');
const statusElement = document.getElementById('status');
const progressElement = document.getElementById('progress');
const canvasElement = document.getElementById('canvas');
const outputElement = document.getElementById('output');
const reviveOverlay = document.getElementById('reviveOverlay');
const healButton = document.getElementById('healButton');
const ammoButton = document.getElementById('ammoButton');
const reviveAdButton = document.getElementById('reviveAdButton');
const giveUpButton = document.getElementById('giveUpButton');
const toastElement = document.getElementById('toast');

const IWAD_NAME = 'freedoom1.wad';
const AD_PLACEMENT_REVIVE = 'revive-hero';
const AD_REWARD_COOLDOWN_MS = 5 * 60 * 1000;
const SIMULATE_ADS = window.location.search.indexOf('simulateads') !== -1;
const useTouch = ('maxTouchPoints' in navigator) && navigator.maxTouchPoints > 1 && navigator.maxTouchPoints < 256;
let userFileDict = {};
let iwadReady = false;
let adsAvailable = true;   // flips to false on unsupported_env
let adBusy = false;
let reviveWatcher = null;
let toastTimer = null;

function toast(msg) {
  toastElement.textContent = msg;
  toastElement.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastElement.style.display = 'none'; }, 2600);
}

var Module = {
  _canLockPointer: true,
  _depsLastLeft: 0,
  _depsDone: 0,
  _depsTotal: 0,
  canvas: (function () {
    canvasElement.addEventListener('webglcontextlost', function (e) {
      e.preventDefault();
      alert('WebGL context lost.  Please reload the page!');
    }, false);
    return canvasElement;
  })(),
  print: (function () { return function (text) { console.log(text); _printText(text); }; })(),
  printErr: (function () { return function (text) { console.error(text); _printText('(!) ' + text); }; })(),
  setStatus: function (text) {
    if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
    if (text === Module.setStatus.last.text) return;
    const m = text.match(/([^(]+)\((\d+(?:\.\d+)?)\/(\d+(?:\.\d+)?|\?)\)/);
    if (m) {
      const now = Date.now();
      if (now - Module.setStatus.last.time < 16.67) return;
      Module.setStatus.last.time = now;
      Module.setStatus.last.text = text;
      const from = Number(m[2]);
      const totalRaw = m[3];
      if (totalRaw !== '?') {
        const to = Number(totalRaw);
        text = m[1].trim() + '<br>(' + (from / 1024).toFixed(0) + ' KiB of ' + (to / 1024).toFixed(0) + ' KiB)';
        progressElement.value = from;
        progressElement.max = to;
        progressElement.hidden = false;
      } else {
        progressElement.hidden = true;
        text = m[1].trim() + '<br>(' + (from / 1024).toFixed(0) + ' KiB)';
      }
    } else {
      progressElement.hidden = true;
    }
    statusElement.innerHTML = text;
  },
  onRuntimeInitialized: function () {
    for (let userFilename in userFileDict) {
      const userFileData = userFileDict[userFilename][1];
      const userFileSize = userFileData.length;
      console.info('Writing to MemFS: ' + userFilename + ' (' + userFileSize + ' bytes)');
      const userDestFile = FS.open('/' + userFilename, 'w');
      FS.write(userDestFile, userFileData, 0, userFileSize, 0);
      FS.close(userDestFile);
    }
    this.showConsole();
    this.setStatus('');
    userFileDict = {};
    statusContainerElement.style.display = 'none';
  },
  monitorRunDependencies: function (left) {
    let depsDiff = Module._depsLastLeft - left;
    if (depsDiff !== 0) {
      if (depsDiff > 0) Module._depsDone += depsDiff;
      else Module._depsTotal -= depsDiff;
      Module._depsLastLeft = left;
      Module.setStatus('Preparing dependencies...<br>(' + Module._depsDone + ' done, ' + Module._depsTotal + ' found)');
    }
  },
  hideConsole: function () {
    if (useTouch && window.olyOn) olyOn();
    outputElement.style.display = 'none';
    canvasElement.style.display = 'block';
    canvasElement.focus();
    startAdButtons();
  },
  showConsole: function () {
    if (useTouch && window.olyOff) olyOff();
    canvasElement.style.display = 'none';
    outputElement.style.display = 'block';
    outputElement.scrollTop = outputElement.scrollHeight;
    outputElement.focus();
    stopAdButtons();
  },
  captureMouse: function () {
    if (!useTouch && Module._canLockPointer && !Module._attemptPointerLock()) {
      Module._canLockPointer = false;
      console.info('Delayed pointer lock requested.');
      document.addEventListener('keydown', Module._lockPointerOnKey);
    }
  },
  winResized: function () {
    console.info('Detected window resize: ' + canvasElement.width + 'x' + canvasElement.height);
    let dVW, dVH, aspX, aspY;
    if (window.CSS.supports('height', '1dvh')) { dVW = '100dvw'; dVH = '100dvh'; }
    else { dVW = '100vw'; dVH = '100vh'; }
    aspX = canvasElement.width + ' / ' + canvasElement.height;
    aspY = canvasElement.height + ' / ' + canvasElement.width;
    canvasElement.style.width = 'calc(min(' + dVW + ', ' + dVH + ' * ' + aspX + '))';
    canvasElement.style.height = 'calc(min(' + dVH + ', ' + dVW + ' * ' + aspY + '))';
    canvasElement.style.marginTop = 'calc(0.5 * (' + dVH + ' - (min(' + dVH + ', ' + dVW + ' * ' + aspY + '))))';
  },
  _attemptPointerLock: function () {
    if (document.pointerLockElement === null) canvasElement.requestPointerLock();
    return document.pointerLockElement !== null;
  },
  _lockPointerOnKey: function (event) {
    if ((event.key === 'Escape') || Module._attemptPointerLock()) {
      document.removeEventListener('keydown', Module._lockPointerOnKey);
      console.info('Delayed pointer lock complete.');
      Module._canLockPointer = true;
    }
  },
  softExit: (status) => { console.info('Program exited with code', status); },
  // Called from the engine (EM_ASM in P_KillMobj) when the console player dies.
  onPlayerDeath: function () {
    console.info('Player died — offering rewarded revive.');
    showReviveOffer();
  },
  arguments: []
};

function _printText(text) {
  outputElement.value += text + '\n';
  if (outputElement.value.length > 2097152) outputElement.value = outputElement.value.slice(-1048576);
  outputElement.scrollTop = outputElement.scrollHeight;
}

// ---------- Rewarded-ad revive ----------

function playerStillDead() {
  try { return Module._JS_PlayerIsDead && Module._JS_PlayerIsDead() === 1; }
  catch (e) { return false; }
}

function showReviveOffer() {
  if (!adsAvailable && !SIMULATE_ADS) return; // no ad surface: vanilla death flow
  if (!playerStillDead()) return;             // spurious notification (e.g. map scripting)
  if (reviveOverlay.style.display === 'block') return; // already offering — keep button state
  if (document.pointerLockElement) document.exitPointerLock();
  reviveAdButton.disabled = false;
  reviveOverlay.style.display = 'block';
  // Player may respawn via keyboard (use key) or the level may change while
  // the offer is up — withdraw the offer the moment it no longer applies.
  clearInterval(reviveWatcher);
  reviveWatcher = setInterval(function () {
    if (!playerStillDead()) hideReviveOffer();
  }, 400);
}

function hideReviveOffer() {
  clearInterval(reviveWatcher);
  reviveWatcher = null;
  reviveOverlay.style.display = 'none';
  canvasElement.focus();
}

function doRevive() {
  if (Module._JS_RevivePlayer && Module._JS_RevivePlayer() === 1) {
    hideReviveOffer();
    Module.captureMouse();
  } else {
    // Player already respawned or state changed — nothing to grant.
    hideReviveOffer();
  }
}

async function showRewardedAd() {
  if (SIMULATE_ADS) {
    await new Promise(r => setTimeout(r, 800));
    return { status: 'rewarded', reward: { amount: 1, type: 'revive' }, requestId: 'sim' };
  }
  if (typeof Verse8Ads === 'undefined') {
    return { status: 'failed', error: { code: 'unsupported_env' }, requestId: '' };
  }
  return Verse8Ads.showRewarded({ placementId: AD_PLACEMENT_REVIVE });
}

reviveAdButton.addEventListener('click', async function () {
  if (adBusy) return;
  adBusy = true;
  reviveAdButton.disabled = true;
  try {
    const result = await showRewardedAd();
    switch (result.status) {
      case 'rewarded':
        doRevive();
        break;
      case 'dismissed':
        toast('Watch the full ad to revive');
        reviveAdButton.disabled = false;
        break;
      case 'failed':
        if (result.error.code === 'busy') { reviveAdButton.disabled = false; break; }
        if (result.error.code === 'unsupported_env') {
          adsAvailable = false;
          hideReviveOffer();
          break;
        }
        toast('Ad unavailable — please try again later');
        reviveAdButton.disabled = false;
        break;
    }
  } catch (e) {
    console.error('Ad error:', e);
    toast('Ad unavailable — please try again later');
    reviveAdButton.disabled = false;
  } finally {
    adBusy = false;
  }
});

giveUpButton.addEventListener('click', function () {
  hideReviveOffer();
  toast(useTouch ? 'Press the ␣ button to restart the level' : 'Press SPACE or E to restart the level');
});

// ---------- Rewarded-ad reward buttons (sit on the STBAR side plates) ----------

const AD_REWARDS = [
  { btn: ammoButton, side: 'left', placement: 'full-ammo', storageKey: 'lastAmmoAd',
    hotkey: 'KeyG', label: 'AMMO', toastMsg: '+ AMMO FULLY RESTOCKED', busy: false,
    canUse: () => Module._JS_NeedsAmmo && Module._JS_NeedsAmmo() === 1,
    grant: () => Module._JS_FullAmmo && Module._JS_FullAmmo() === 1 },
  { btn: healButton, side: 'right', placement: 'full-heal', storageKey: 'lastHealAd',
    hotkey: 'KeyH', label: 'HEAL', toastMsg: '+ HEALTH RESTORED TO 100%', busy: false,
    canUse: () => { const h = Module._JS_GetHealth(); return h > 0 && h < 100; },
    grant: () => Module._JS_FullHeal && Module._JS_FullHeal() === 1 },
];
let adTicker = null;

function cooldownLeft(key) {
  const last = Number(localStorage.getItem(key) || 0);
  return Math.max(0, last + AD_REWARD_COOLDOWN_MS - Date.now());
}

function updateAdButtons() {
  const r = canvasElement.getBoundingClientRect();
  const barH = r.height * 0.16;        // status bar = 32/200 of the frame
  const sideW = r.width * (53 / 426);  // one side plate of the wide STBAR
  for (const cfg of AD_REWARDS) {
    const b = cfg.btn;
    if ((!adsAvailable && !SIMULATE_ADS) || typeof Module._JS_GetHealth !== 'function' || r.height === 0) {
      b.style.display = 'none';
      continue;
    }
    // buttons centered on the side plates; font sized so "AMMO [G]" fits
    const bw = Math.round(sideW * 0.78);
    const bh = Math.round(barH * 0.62);
    b.style.display = 'block';
    b.style.width = bw + 'px';
    b.style.height = bh + 'px';
    // touch overlays (fire/use) live over the right plate — lift buttons above the bar there
    b.style.top = Math.round((useTouch ? r.bottom - 2 * barH : r.bottom - barH) + (barH - bh) / 2 + 5) + 'px';
    b.style.left = Math.round((cfg.side === 'left' ? r.left : r.right - sideW) + (sideW - bw) / 2) + 'px';
    b.style.fontSize = Math.max(8, Math.round(Math.min(barH * 0.15, bw / 7))) + 'px';

    if (cfg.busy) continue;
    const left = cooldownLeft(cfg.storageKey);
    if (left > 0) {
      const s = Math.ceil(left / 1000);
      b.disabled = true;
      b.innerHTML = '<span class="adTag">AD &#9654;</span>' + Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    } else if (!cfg.canUse()) {
      b.disabled = true;
      b.innerHTML = '<span class="adTag">AD &#9654;</span>' + cfg.label;
    } else {
      b.disabled = false;
      b.innerHTML = '<span class="adTag">AD &#9654;</span>' + cfg.label + (useTouch ? '' : ' [' + cfg.hotkey.slice(3) + ']');
    }
  }
}

function startAdButtons() {
  if (adTicker) return;
  updateAdButtons();
  adTicker = setInterval(updateAdButtons, 1000);
}

function stopAdButtons() {
  clearInterval(adTicker);
  adTicker = null;
  for (const cfg of AD_REWARDS) cfg.btn.style.display = 'none';
}

// Hotkeys work even while the pointer is locked to the game. Capture phase +
// stopPropagation keeps the press away from the engine.
window.addEventListener('keydown', function (e) {
  for (const cfg of AD_REWARDS) {
    if (e.code === cfg.hotkey && adTicker && !cfg.btn.disabled && !cfg.busy) {
      e.stopPropagation();
      e.preventDefault();
      cfg.btn.click();
      return;
    }
  }
}, true);

for (const cfg of AD_REWARDS) {
  cfg.btn.addEventListener('click', async function () {
    if (cfg.busy || cfg.btn.disabled) return;
    cfg.busy = true;
    cfg.btn.disabled = true;
    if (document.pointerLockElement) document.exitPointerLock();
    try {
      const result = SIMULATE_ADS
        ? await new Promise(r => setTimeout(() => r({ status: 'rewarded' }), 800))
        : (typeof Verse8Ads === 'undefined'
            ? { status: 'failed', error: { code: 'unsupported_env' } }
            : await Verse8Ads.showRewarded({ placementId: cfg.placement }));
      switch (result.status) {
        case 'rewarded':
          if (cfg.grant()) {
            localStorage.setItem(cfg.storageKey, String(Date.now()));
            toast(cfg.toastMsg);
          }
          break;
        case 'dismissed':
          toast('Watch the full ad to claim the reward');
          break;
        case 'failed':
          if (result.error.code === 'unsupported_env') { adsAvailable = false; stopAdButtons(); }
          else if (result.error.code !== 'busy') toast('Ad unavailable — please try again later');
          break;
      }
    } catch (e) {
      console.error('Ad error:', e);
      toast('Ad unavailable — please try again later');
    } finally {
      cfg.busy = false;
      canvasElement.focus();
      Module.captureMouse();
      updateAdButtons();
    }
  });
}

// ---------- Boot sequence ----------

// Optional art/mod overlay: if public/custom.wad exists it is loaded as a
// PWAD on top of the IWAD (menu graphics, title screen, sounds, maps...).
async function fetchOptionalPWAD() {
  try {
    const r = await fetch('custom.wad');
    if (!r.ok) return;
    const buf = new Uint8Array(await r.arrayBuffer());
    const magic = String.fromCharCode.apply(null, buf.slice(0, 4));
    if (magic !== 'PWAD') return; // 404 fallback pages etc. won't match
    userFileDict['custom.wad'] = ['p', buf];
    console.info('custom.wad loaded (' + buf.length + ' bytes)');
  } catch (e) { /* no overlay — vanilla assets */ }
}

async function fetchIWAD() {
  const response = await fetch(IWAD_NAME);
  if (!response.ok) throw new Error('Failed to fetch ' + IWAD_NAME + ': ' + response.status);
  const total = Number(response.headers.get('Content-Length')) || 0;
  const reader = response.body.getReader();
  const chunks = [];
  let received = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    if (total) { dlProgressElement.value = received; dlProgressElement.max = total; }
  }
  const data = new Uint8Array(received);
  let offset = 0;
  for (const chunk of chunks) { data.set(chunk, offset); offset += chunk.length; }
  userFileDict[IWAD_NAME] = ['i', data];
  iwadReady = true;
  dlProgressElement.style.display = 'none';
  startButton.disabled = false;
  startButton.textContent = useTouch ? 'TAP TO START' : 'CLICK TO START';
}

function bootWASM() {
  Module.setStatus('Starting engine...');
  _printText('Freedoom Web is starting...');
  _printText('');
  const mainScript = document.createElement('script');
  mainScript.src = 'index.js';
  mainScript.async = true;
  document.body.appendChild(mainScript);
}

function startGame() {
  window.scrollTo(0, 0);
  startContainerElement.style.display = 'none';
  statusContainerElement.style.display = 'block';
  let module_arguments = ['-iwad', IWAD_NAME];
  if (userFileDict['custom.wad'])
    module_arguments = module_arguments.concat(['-file', 'custom.wad']);
  if (window.location.search.length > 1)
    module_arguments = module_arguments.concat(
      window.location.search.substr(1).split('&').filter(a => a !== 'simulateads'));
  Module['arguments'] = module_arguments;
  console.info('Freedoom Web -- based on Dwasm (PrBoom+/PrBoomX WebAssembly port, GPL-2.0)');
  Object.defineProperty(document, 'title', { set: function (value) { console.info(value); } });
  if (useTouch) {
    Module.setStatus('Preparing controls...');
    const olyScript = document.createElement('script');
    olyScript.src = 'oly.js';
    olyScript.async = true;
    olyScript.onload = function () {
      olySetup({
        'Escape': { lbl: '&#8801;' }, 'Enter': { lbl: '&#8617;', pos: [15, 0] },
        'ArrowUp': { lbl: '&#8593;', pos: [0, 15] }, 'ArrowDown': { lbl: '&#8595;', pos: [0, 30] },
        'ArrowLeft': { lbl: '&#8592;', pos: [15, 15] }, 'ArrowRight': { lbl: '&#8594;', pos: [15, 30] },
        'Tab': { lbl: '&#8677;', anc: 'R', pos: [30, 0] }, 'Minus': { lbl: '-', anc: 'R', pos: [15, 0] },
        'Equal': { lbl: '+', anc: 'R' },
        'KeyW': { lbl: 'W', anc: 'B', pos: [10, 20], shape: 'U' }, 'KeyS': { lbl: 'S', anc: 'B', pos: [10, 0], shape: 'D' },
        'KeyA': { lbl: 'A', anc: 'B', pos: [0, 10], shape: 'L' }, 'KeyD': { lbl: 'D', anc: 'B', pos: [20, 10], shape: 'R' },
        'ControlLeft': { lbl: '&#10753;', anc: 'RB', pos: [0, 10], shape: '' }, 'Space': { lbl: '&#9251;', anc: 'RB', pos: [20, 10], shape: '' },
        'KeyY': { lbl: 'Y', anc: 'R', pos: [0, 15] }, 'KeyN': { lbl: 'N', anc: 'R', pos: [0, 30] },
        'MWhlUp': { lbl: '&#9881;&#8593;', anc: 'R', pos: [15, 15] }, 'MWhlDn': { lbl: '&#9881;&#8595;', anc: 'R', pos: [15, 30] }
      }, 3);
      bootWASM();
    };
    document.body.appendChild(olyScript);
  } else {
    bootWASM();
  }
}

startButton.addEventListener('click', function () {
  if (!iwadReady) return;
  startGame();
});

(function fillControlsHint() {
  const rows = useTouch
    ? [['Move / Aim', 'On-screen pad'], ['Fire / Use', 'On-screen buttons'], ['Heal / Ammo', 'Tap AD buttons']]
    : [['Move', 'W A S D'], ['Aim / Fire', 'Mouse'], ['Use / Open', 'Space &middot; E'],
       ['Weapons', '1 &ndash; 7'], ['Full Heal &middot; AD', 'H'], ['Full Ammo &middot; AD', 'G'],
       ['Menu / Help', 'Esc &middot; F1']];
  document.getElementById('controlsHint').innerHTML =
    rows.map(r => '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>').join('');
})();

outputElement.value = '';
Promise.all([fetchIWAD(), fetchOptionalPWAD()]).catch(function (err) {
  console.error(err);
  startButton.textContent = 'LOAD FAILED — PLEASE REFRESH';
});
</script>
